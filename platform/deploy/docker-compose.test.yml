services:
  backend-tests:
    build:
      context: ../..
      dockerfile: platform/backend/Dockerfile.test
    environment:
      TEST_DATABASE_URL: ${TEST_DATABASE_URL}
      DATABASE_URL: ${TEST_DATABASE_URL}
      REDIS_URL: redis://redis:6379/0
      RUN_REDIS_TESTS: "1"
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend-tests:
    build:
      context: ../frontend
      dockerfile: Dockerfile.test

  e2e:
    build:
      context: ../frontend
      dockerfile: Dockerfile.e2e
    environment:
      RUN_E2E: "1"
      E2E_BASE_URL: http://frontend
    ipc: host
    volumes:
      - ../docs/screenshots:/app/platform/docs/screenshots
    depends_on:
      frontend:
        condition: service_healthy
