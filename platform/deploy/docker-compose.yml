x-backend-environment: &backend-environment
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  ARTIFACT_STORE_ROOT: ${ARTIFACT_STORE_ROOT:-/app/platform/artifact_store}
  INGEST_WORK_ROOT: ${INGEST_WORK_ROOT:-/app/platform/.runtime/ingest-work}
  INGEST_CLI_SRC: ${INGEST_CLI_SRC:-/app/ingest-cli/src}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
  PYTHONUNBUFFERED: "1"

x-backend-service: &backend-service
  build:
    context: ../..
    dockerfile: platform/backend/Dockerfile
  env_file:
    - ../.env
  environment: *backend-environment
  volumes:
    - type: bind
      source: ${ARTIFACT_STORE_HOST_PATH:-../artifact_store}
      target: /app/platform/artifact_store
    - ingest_work:/app/platform/.runtime/ingest-work
  restart: unless-stopped

services:
  postgres:
    image: postgres:17.10-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:7.4.9-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  api:
    <<: *backend-service
    command: >-
      sh -c "python -m alembic upgrade head &&
      python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 30

  publisher:
    <<: *backend-service
    command: ["python", "-m", "app.outbox.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    <<: *backend-service
    command: ["python", "-m", "app.worker.main"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

volumes:
  postgres_data:
  ingest_work:
